<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고등 영어 서답형 출제 AI 익스프레스</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        body { padding: 20px; max-width: 1300px; margin: 0 auto; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 20px; }
        @media (max-width: 900px) { .grid-container { grid-template-columns: 1fr; } }
        .loading { display: none; color: #2563eb; font-weight: bold; margin-top: 10px; background: #eff6ff; padding: 10px; border-radius: 4px; }
        .result-box { background: #f8fafc; border-left: 5px solid #10b981; padding: 15px; border-radius: 4px; white-space: pre-wrap; color: #1e293b; min-height: 250px; border: 1px solid #e2e8f0; }
        
        .auth-panel { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        /* ⚙️ 설정 버튼 디자인 */
        .btn-settings { margin: 0; width: auto; font-size: 14px; padding: 8px 16px; border: none; transition: all 0.2s; }
        .btn-settings.gray { background-color: #64748b !important; color: white !important; }
        .btn-settings.blue { background-color: #2563eb !important; color: white !important; }

        /* 🔒 모달 팝업 레이아웃 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 25px; border-radius: 8px; max-width: 500px; width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        /* 📸 이미지 업로드 구역 */
        .paste-zone { border: 3px dashed #94a3b8; padding: 50px 20px; border-radius: 8px; text-align: center; background: #f8fafc; cursor: pointer; transition: all 0.2s; margin-bottom: 15px; }
        .paste-zone:hover, .paste-zone.dragover { border-color: #2563eb; background: #eff6ff; }
        .preview-img { max-width: 100%; max-height: 350px; display: none; margin: 15px auto 0; border-radius: 6px; border: 1px solid #cbd5e1; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        textarea { background-color: #ffffff; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAvGq_MefnWW91lVO94LcnkT1klLY_XtLs",
            authDomain: "impact7-test.firebaseapp.com",
            projectId: "impact7-test",
            storageBucket: "impact7-test.firebasestorage.app",
            messagingSenderId: "492840515825",
            appId: "1:492840515825:web:58afa88d3c945383685150",
            measurementId: "G-ENPZMXM2BC"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let GEMINI_API_KEY = "";

        // 🚀 DOM이 완전히 로드된 후 이벤트를 바인딩하여 Null 에러를 원천 차단합니다.
        document.addEventListener("DOMContentLoaded", () => {
            const btnSettings = document.getElementById('btnSettings');
            const configModal = document.getElementById('configModal');
            const apiKeyInput = document.getElementById('apiKey');

            // 모달 열고 닫기
            btnSettings.addEventListener('click', () => configModal.style.display = 'flex');
            document.getElementById('btnCloseModal').addEventListener('click', () => configModal.style.display = 'none');

            // 로그인 / 로그아웃
            document.getElementById('btnLogin').addEventListener('click', () => {
                signInWithPopup(auth, provider).catch(error => alert("로그인 실패: " + error.message));
            });
            document.getElementById('btnLogout').addEventListener('click', () => {
                signOut(auth);
            });

            // 관리자 API 키 영구 저장
            document.getElementById('btnSaveKey').addEventListener('click', async () => {
                const keyInput = apiKeyInput.value.trim();
                if(!keyInput) return alert("Gemini API 키를 입력해 주세요.");
                
                try {
                    await setDoc(doc(db, "secure_config", "gemini"), { apiKey: keyInput });
                    GEMINI_API_KEY = keyInput;
                    
                    btnSettings.className = "btn-settings blue";
                    btnSettings.textContent = "⚙️ 설정 (연결됨)";
                    
                    alert("API 키가 파이어베이스에 영구 저장되었습니다. 모든 강사님에게 자동 연동됩니다.");
                    configModal.style.display = 'none';
                } catch (e) {
                    alert("데이터베이스 저장 실패: " + e.message);
                }
            });
        });

        // 인증 상태 변경 감지
        onAuthStateChanged(auth, async (user) => {
            const userInfo = document.getElementById('userInfo');
            const btnLogin = document.getElementById('btnLogin');
            const btnLogout = document.getElementById('btnLogout');
            const btnSettings = document.getElementById('btnSettings');
            const apiKeyInput = document.getElementById('apiKey');

            if (user) {
                const email = user.email;
                const domain = email.split('@')[1];

                if (domain !== 'impact7.kr') {
                    alert("인증 오류: @impact7.kr 공식 계정만 접근 가능합니다.");
                    await signOut(auth);
                    return;
                }

                if(btnLogin) btnLogin.style.display = "none";
                if(btnLogout) btnLogout.style.display = "inline-block";
                if(userInfo) userInfo.textContent = `👤 ${user.displayName} 선생님`;

                try {
                    const docRef = await getDoc(doc(db, "secure_config", "gemini"));
                    if (docRef.exists() && docRef.data().apiKey) {
                        GEMINI_API_KEY = docRef.data().apiKey;
                        if(apiKeyInput) apiKeyInput.value = GEMINI_API_KEY;
                        
                        if(btnSettings) {
                            btnSettings.className = "btn-settings blue";
                            btnSettings.textContent = "⚙️ 설정 (연결됨)";
                        }
                    } else {
                        if(btnSettings) {
                            btnSettings.className = "btn-settings gray";
                            btnSettings.textContent = "⚙️ 설정 (키 미등록)";
                        }
                    }
